# Sample workflow for building and deploying a Jekyll site to GitHub Pages
name: Deploy Jekyll with GitHub Pages dependencies preinstalled

on:
  workflow_dispatch:
  # Runs on pushes targeting the default branch
  # push:
  #   branches: ["master"]

  # Allows you to run this workflow manually from the Actions tab

# Sets permissions of the GITHUB_TOKEN to allow deployment to GitHub Pages
permissions:
  contents: write
  pages: write
  id-token: write

# Allow only one concurrent deployment, skipping runs queued between the run in-progress and latest queued.
# However, do NOT cancel in-progress runs as we want to allow these production deployments to complete.
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Pages
        uses: actions/configure-pages@v4
      - name: Build with Jekyll
        uses: actions/jekyll-build-pages@v1
        with:
          source: ./src/
          destination: ./_site
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
  
  AutoTag:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
    - uses: actions/checkout@v4
      with:
        fetch-tags: true
    - run: |
        LATEST_TAG=$(git ls-remote --tags --sort=-v:refname 2>&1 |grep -Eo "refs/tags/v([0-9]+.)+[0-9]+" |head -n 1 |cut -d "/" -f 3 || true);
        if [ ! -z "$LATEST_TAG" ]; then echo "Latest tag in remote is $LATEST_TAG"; else echo "LATEST_TAG not detected."; exit 1; fi

        major=$(echo $LATEST_TAG |cut -d "." -f 1 |grep -Eo "[0-9]+");
        minor=$(echo $LATEST_TAG |cut -d "." -f 2 |grep -Eo "[0-9]+");
        patch=0;
        let "minor = $minor + 1";

        new_tag="${major}.${minor}.${patch}"

        git tag "v${new_tag}"
        git push origin "v${new_tag}"