<section id="contact">
        <div class="container">
            <div class="row">
                <div class="col-lg-12 text-center">
                    <h2 class="section-heading">Contact</h2>
                    <!-- <h3 class="section-heading">Schedule a 30 minutes call now.</h3> -->
                    <!-- <h3 class="section-heading">
                        <a href="https://calendly.com/y-yarmoshyk/30min" target="_blank">Schedule a 30 minutes call now</a>
                    </h3> -->
                    <!-- <br><br> -->
                    <h3 class="section-heading">Send me an email notice ...</h3>
                    <h3 class="section-subheading text-muted">... and I'll reach out to you at the earliest convinience.</h3>
                </div>
            </div>
            <div class="row">
                <div class="col-lg-12">
                    <form id="contact-form" accept-charset="UTF-8" action="https://formbold.com/s/9xmzW" method="POST" enctype="multipart/form-data" target="_blank">                         
                        <div class="row">
                            <div class="col-md-6">
                                <div class="control-group form-group">
                                    <input type="text" class="form-control" placeholder="Your Name *" id="name" required data-validation-required-message="Please enter your name." name="name">
                                    <p class="help-block text-danger"></p>
                                </div>
                                <div class="control-group form-group">
                                    <input type="email" class="form-control" placeholder="Your Email *" id="email" required data-validation-required-message="Please enter your email address." name="email">
                                    <p class="help-block text-danger"></p>
                                </div>
                            </div>
                            <div class="col-md-6">
                                <div class="control-group form-group">
                                    <textarea class="form-control" placeholder="Your Message *" id="message" required data-validation-required-message="Please enter a message." name="message"></textarea>
                                    <p class="help-block text-danger"></p>
                                </div>
                            </div>

                            <script async src="https://www.google.com/recaptcha/api.js"></script>

                             <script>
                                function onSubmit(token) {
                                    document.getElementById("contact-form").submit();
                                }
                            </script>


                            <div class="clearfix"></div>
                            <div class="col-lg-12 text-center">
                                <div id="success"></div>
                                
                                <button id="sendMessageButton" class="btn btn-primary btn-xl text-uppercase g-recaptcha" type="submit" data-sitekey="reCAPTCHA_site_key" data-callback='onSubmit' data-action='submit'>>Send Message</button>

                            </div>
                            
                        </div>
                    </form>

                </div>
            </div>
        </div>
    </section>
